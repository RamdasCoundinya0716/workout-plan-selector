<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Workout Plan Selector</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s ease;
    }

    body {
      background-color: #f4f4f4;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      padding: 20px;
    }

    .container {
      background: #fff;
      padding: 25px 30px;
      border-radius: 12px;
      box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    h2 {
      margin-bottom: 12px;
      font-weight: 600;
    }

    select {
      padding: 10px;
      margin-top: 15px;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }

    .plan-link {
      margin-top: 20px;
    }

    .plan-link button {
      background-color: #007bff;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      color: white;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
    }

    .plan-link button:hover {
      background-color: #0056b3;
    }

    .toggle-btn {
      margin-top: 16px;
      background: #333;
      padding: 6px 12px;
      border-radius: 5px;
      cursor: pointer;
      color: #fff;
      display: inline-block;
    }

    .dark-mode {
      background-color: #222;
      color: #fff;
    }

    .dark-mode .container {
      background: #333;
    }

    .dark-mode select {
      background: #444;
      color: #fff;
      border: 1px solid #666;
    }

    .dark-mode .plan-link button {
      background-color: #1d84f7;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🏋️ Workout Plan Selector</h2>
    <p>Select how many days you can hit the gym:</p>

    <select id="daySelector">
      <option value="">-- Choose Days --</option>
      <option value="3">3 Days</option>
      <option value="4">4 Days</option>
      <option value="5">5 Days</option>
      <option value="6">6 Days</option>
    </select>

    <div class="plan-link" id="planLink"></div>

    <div class="toggle-btn" onclick="toggleDarkMode()">🌙 Toggle Dark Mode</div>
  </div>

  <script>
    const links = {
      3: "https://docs.google.com/document/d/1ju_KcRZ2tpBow59h7Wii5blfRiR_Xuv_XNhnM6NVqmg/edit?usp=drivesdk",
      4: "https://docs.google.com/document/d/11SAeQUFcz4-veLXBgZU3DfEIaswhfT2xf9N87wFeBU8/edit?usp=drivesdk",
      5: "https://docs.google.com/document/d/1IHulCUE-A4mqi513hB-Q67mzOmUA5ac6beB19F3TZME/edit?usp=drivesdk",
      6: "https://docs.google.com/document/d/1_BkkG0QxzsRr0CKM6XnGlzlHTckShEwdfU5e_yzPVFY/edit?usp=drivesdk"
    };

    document.getElementById('daySelector').addEventListener('change', function () {
      const selected = this.value;
      const planLinkDiv = document.getElementById('planLink');
      planLinkDiv.innerHTML = '';

      if (links[selected]) {
        const button = document.createElement('button');
        button.textContent = `Click here for ${selected}-day workout plan`;
        button.onclick = () => window.open(links[selected], '_blank');
        planLinkDiv.appendChild(button);
      }
    });

    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
    }
  </script>
</body>
</html>
