
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Workout Plan Selector</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s ease;
    }

    body {
      background-color: #f4f4f4;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: auto;
      flex-direction: column;
      padding: 30px 20px;
    }

    .container {
      background: #fff;
      padding: 25px 30px;
      border-radius: 12px;
      box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    h2, h3 {
      margin-bottom: 12px;
      font-weight: 600;
    }

    select, input[type="number"] {
      padding: 10px;
      margin-top: 15px;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }

    .plan-link {
      margin-top: 20px;
    }

    .plan-link button,
    .container button {
      background-color: #007bff;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      color: white;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
    }

    .container button:hover {
      background-color: #0056b3;
    }

    .toggle-btn {
      margin-top: 16px;
      background: #333;
      padding: 6px 12px;
      border-radius: 5px;
      cursor: pointer;
      color: #fff;
      display: inline-block;
    }

    .dark-mode {
      background-color: #222;
      color: #fff;
    }

    .dark-mode .container {
      background: #333;
    }

    .dark-mode select,
    .dark-mode input[type="number"] {
      background: #444;
      color: #fff;
      border: 1px solid #666;
    }

    .dark-mode .plan-link button {
      background-color: #1d84f7;
    }

    #tdeeBot {
      text-align: left;
    }

    #tdeeBot label {
      display: block;
      margin-top: 10px;
    }

    #tdeeResult {
      margin-top: 15px;
      font-size: 15px;
      line-height: 1.5;
    }

    img.bodyfat-img {
      width: 100%;
      margin-top: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🏋️ Workout Plan Selector</h2>
    <p>Select how many days you can hit the gym:</p>

    <select id="daySelector">
      <option value="">-- Choose Days --</option>
      <option value="3">3 Days</option>
      <option value="4">4 Days</option>
      <option value="5">5 Days</option>
      <option value="6">6 Days</option>
    </select>

    <div class="plan-link" id="planLink"></div>

    <div class="toggle-btn" onclick="toggleDarkMode()">🌙 Toggle Dark Mode</div>

    <div class="toggle-btn" onclick="toggleTDEE()">🤖 Not sure about diet? Click here</div>

    <div id="tdeeBot" style="display:none; margin-top:20px;">
      <h3>🧠 Nutrition Assistant</h3>
      
      <label>Weight (kg): 
        <input type="number" id="weightInput" />
      </label>

      <label>Body Fat %:
        <select id="bodyFatSelect">
          <option value="">-- Select --</option>
          <option value="10">10%</option>
          <option value="15">15%</option>
          <option value="20">20%</option>
          <option value="25">25%</option>
          <option value="30">30%</option>
        </select>
      </label>

      <label>Activity Level:
        <select id="activityLevel">
          <option value="1.2">Sedentary</option>
          <option value="1.375">Lightly Active</option>
          <option value="1.55">Moderately Active</option>
          <option value="1.725">Very Active</option>
          <option value="1.9">Athlete Level</option>
        </select>
      </label>

      <label>Body Type:
        <select id="bodyType">
          <option value="ectomorph">Ectomorph</option>
          <option value="mesomorph">Mesomorph</option>
          <option value="endomorph">Endomorph</option>
        </select>
      </label>

      <button onclick="calculateTDEE()">Calculate TDEE & Protein</button>

      <div id="tdeeResult"></div>

      <img src="https://raw.githubusercontent.com/RamdasCoundinya0716/workout-plan-selector/main/bodyfatimage.jpg" alt="Body Fat Reference" class="bodyfat-img" />
    </div>
  </div>

  <script>
    const links = {
      3: "https://docs.google.com/document/d/1ju_KcRZ2tpBow59h7Wii5blfRiR_Xuv_XNhnM6NVqmg/edit?usp=drivesdk",
      4: "https://docs.google.com/document/d/11SAeQUFcz4-veLXBgZU3DfEIaswhfT2xf9N87wFeBU8/edit?usp=drivesdk",
      5: "https://docs.google.com/document/d/1IHulCUE-A4mqi513hB-Q67mzOmUA5ac6beB19F3TZME/edit?usp=drivesdk",
      6: "https://docs.google.com/document/d/1_BkkG0QxzsRr0CKM6XnGlzlHTckShEwdfU5e_yzPVFY/edit?usp=drivesdk"
    };

    document.getElementById('daySelector').addEventListener('change', function () {
      const selected = this.value;
      const planLinkDiv = document.getElementById('planLink');
      planLinkDiv.innerHTML = '';

      if (links[selected]) {
        const button = document.createElement('button');
        button.textContent = `Click here for ${selected}-day workout plan`;
        button.onclick = () => window.open(links[selected], '_blank');
        planLinkDiv.appendChild(button);
      }
    });

    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
    }

    function toggleTDEE() {
      const tdeeBox = document.getElementById('tdeeBot');
      tdeeBox.style.display = tdeeBox.style.display === 'none' ? 'block' : 'none';
    }

    function calculateTDEE() {
      const weight = parseFloat(document.getElementById('weightInput').value);
      const bf = parseFloat(document.getElementById('bodyFatSelect').value);
      const activity = parseFloat(document.getElementById('activityLevel').value);
      const bodyType = document.getElementById('bodyType').value;

      if (isNaN(weight) || isNaN(bf) || isNaN(activity)) {
        alert("Please fill in all values.");
        return;
      }

      const leanMass = weight * (1 - bf / 100);
      const bmr = 370 + (21.6 * leanMass); // Katch-McArdle
      const tdee = bmr * activity;
      const proteinLow = (1.8 * leanMass).toFixed(1);
      const proteinHigh = (2.2 * leanMass).toFixed(1);

      document.getElementById('tdeeResult').innerHTML = `
        <p><strong>Body Type:</strong> ${bodyType.charAt(0).toUpperCase() + bodyType.slice(1)}</p>
        <p><strong>Lean Body Mass:</strong> ${leanMass.toFixed(1)} kg</p>
        <p><strong>BMR:</strong> ${bmr.toFixed(0)} kcal/day</p>
        <p><strong>TDEE:</strong> ${tdee.toFixed(0)} kcal/day</p>
        <p><strong>Protein Requirement:</strong> ${proteinLow}g – ${proteinHigh}g</p>
      `;
    }
  </script>
</body>
</html>
